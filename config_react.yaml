# CRAFT reaction configuration reference
#
# Copy this file, fill in the values for your two residues, and save it as
# config.yaml in your working directory.  Use this template when parameterizing
# two residues that form a covalent bond through their side chains — disulfide
# bonds, isopeptide bonds, NOS bonds (Lys–Cys), acylation of Ser/Cys, etc.
#
# For single-residue parameterization use config.yaml instead.
#
#
# -- Commands ------------------------------------------------------------------
#
#   Phase 1 (local):
#     craft-run --config config.yaml
#
#   Phase 2b (local, after opt log arrives from HPC):
#     craft-hf-input <r1>_<r2>/<r1>_<r2>_react_opt.log \
#                    --charge <total> --config config.yaml
#
#   Phase 3 (local, after HF log arrives from HPC):
#     craft-amber <r1>_<r2>/<r1>_<r2>_react_hf.log --config config.yaml
#
#   Single SLURM job (full pipeline):
#     craft-slurm --config config.yaml
#     cd <r1>_<r2> && sbatch <r1>_<r2>_react_craft.sh
#
# -- Output layout -------------------------------------------------------------
#
#   <resname1>_<resname2>/
#     <r1>_<r2>_react_combined.pdb     combined model compound (4 cap groups)
#     <r1>_<r2>_react_opt.com          frozen-backbone Gaussian opt input
#     resp.in, resp.qin, rename_map.json
#     <r1>_<r2>_react.ac
#     <r1>_<r2>_react_gaff.frcmod      shared for both residues
#     <r1>_<r2>_react_ff14SB.frcmod    shared for both residues
#     <resname1>/
#       <resname1>_capped.pdb, <resname1>.mc, <resname1>.prepin
#     <resname2>/
#       <resname2>_capped.pdb, <resname2>.mc, <resname2>.prepin

# -- Residue 1 -----------------------------------------------------------------
residue1:
  input_pdb: RES1/RES1.pdb   # raw (uncapped) single-residue PDB; optional if
                             # reaction.combined_pdb is set (names auto-detected)
  charge: 0                  # formal charge of this residue in the bonded state
  position: middle           # middle | cterm | nterm

# -- Residue 2 -----------------------------------------------------------------
residue2:
  input_pdb: RES2/RES2.pdb   # raw (uncapped) single-residue PDB; optional if
                             # reaction.combined_pdb is set (names auto-detected)
  charge: 0                  # formal charge of this residue in the bonded state
  position: middle           # middle | cterm | nterm
                             # total QM charge = residue1.charge + residue2.charge
                             # each value is written to that residue's .mc CHARGE field

# -- Reaction ------------------------------------------------------------------
reaction:
  atom1: SG                  # reactive atom name in residue1
  atom2: NZ                  # reactive atom name in residue2
  bond_length: 1.5           # Å (optional; default 1.5); ignored if combined_pdb is set
  combined_pdb:              # optional: path to a pre-capped combined PDB that
                             # already contains both residues capped with ACE/NME
                             # (6 groups with resSeq 1-6: ACE/res1/NME/ACE/res2/NME).
                             # CRAFT renames conflicting atoms in the second residue
                             # block automatically — no manual renaming needed.
                             # The geometry optimisation is not skipped; only the
                             # CRAFT cap-and-assemble step is.

# -- Phase 1b: frozen-backbone geometry optimisation (B3LYP/6-31G*) -----------
gaussian_opt:
  nproc: 16
  mem: 512MB
  freeze_backbone: true      # Recommended: keep backbone + cap atoms fixed so only
                             # the side chains are free to relax. This prevents the
                             # model compound from drifting into non-physiological
                             # backbone conformations. Set to false only if you know
                             # what you are doing and have a specific reason to allow
                             # full relaxation.

# -- Phase 2: HF/6-31G(d) single-point for ESP/RESP ---------------------------
gaussian_hf:
  nproc: 16
  mem: 512MB

# -- Phase 3: AMBER parameterization ------------------------------------------
amber:
  atom_type: amber           # amber | gaff | gaff2  (passed to antechamber -at)
  forcefield: ff14SB         # ff14SB | ff19SB | ~  (~ to skip; requires $AMBERHOME)

# -- SLURM (used by craft-slurm) ----------------------------------------------
slurm:
  job_name:               # leave blank -> <r1>_<r2>_react_craft
  output: param_%j.out
  error:  param_%j.err
  ntasks: 1
  cpus_per_task: 16
  account: YOUR_ACCOUNT
  partition: YOUR_PARTITION
  modules:
    - apps/gaussian/g16
    - apps/amber/24               # needed for espgen, resp, antechamber, parmchk2
  conda_env:              # conda environment with numpy/pyyaml and craft installed
