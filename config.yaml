# CRAFT configuration reference
#
# Copy this file, fill in the values for your residue, and save it as config.yaml
# in your working directory. All outputs land in <resname>/<position>/,
# e.g. KME3/middle/, KME3/cterm/, KME3/nterm/
#
# -- If CRAFT is installed as a package (pip install .) ----------------------
#
#   Manually (step-by-step):
#     craft-run                                         # Phase 1
#     craft-hf-input KME3/middle/KME3_opt.log           # Phase 2b
#     craft-amber    KME3/middle/KME3_hf.log            # Phase 3
#
#   Single SLURM job (full pipeline):
#     craft-slurm                         # generates KME3/middle/KME3_craft.sh
#     cd KME3/middle && sbatch KME3_craft.sh
#
# -- If running directly from source (no install) ----------------------------
#
#   Manually (step-by-step):
#     python run.py                                     # Phase 1
#     python make_hf_input.py KME3/middle/KME3_opt.log  # Phase 2b
#     python amber_pipeline.py KME3/middle/KME3_hf.log  # Phase 3
#
#   Single SLURM job (full pipeline):
#     python make_slurm.py                # generates KME3/middle/KME3_craft.sh
#     cd KME3/middle && sbatch KME3_craft.sh

# -- Residue -------------------------------------------------------------------
residue:
  input_pdb: YOUR_RESNAME/YOUR_RESNAME.pdb   # raw (uncapped) single-residue PDB
  charge: 0                                  # net molecular charge (e.g. 1 for cationic)
  multiplicity: 1                            # spin multiplicity (1 = singlet)
  position: middle                           # middle | cterm | nterm

# -- Phase 1a: capping ---------------------------------------------------------
cap:
  output_pdb:             # leave blank -> <base>_capped.pdb in <resname>/<position>/

# -- Phase 1b: geometry optimisation (B3LYP/6-31G*) ---------------------------
gaussian_opt:
  nproc: 16
  mem: 512MB
  route: "#P b3lyp/6-31g* opt"
  output_com:             # leave blank -> <base>_opt.com in <resname>/<position>/

# -- Phase 2: HF/6-31G(d) single-point for ESP/RESP ---------------------------
gaussian_hf:
  nproc: 16
  mem: 512MB
  route: "#p hf/6-31g(d) SCF=Tight Pop=MK IOp(6/33=2)"
  output_com:             # leave blank -> <base>_hf.com in <resname>/<position>/

# -- Phase 3: AMBER parameterization ------------------------------------------
amber:
  atom_type: amber        # amber | gaff | gaff2  (passed to antechamber -at)
  forcefield: ff14SB      # ff14SB | ff19SB | ~  (~ to skip; requires $AMBERHOME)
  workdir:                # leave blank -> derived from HF log path

# -- SLURM (used by make_slurm.py) --------------------------------------------
slurm:
  job_name:               # leave blank -> <base>_craft
  output: param_%j.out
  error:  param_%j.err
  ntasks: 1
  cpus_per_task: 16
  account: YOUR_ACCOUNT
  partition: YOUR_PARTITION
  modules:
    - apps/gaussian/g16
    - apps/amber/24               # needed for espgen, resp, antechamber, parmchk2
  conda_env:              # conda environment that has numpy/pyyaml AND where craft was
                          # installed (pip install .); leave blank if craft-* commands are
                          # already available in the default PATH
